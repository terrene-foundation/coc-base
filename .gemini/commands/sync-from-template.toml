## Step 0: Verify Repo Class (this verb is for downstream consumers)

Read `.claude/VERSION` â†’ `type`. `/sync-from-template` is valid at a downstream consumer (`type: coc-project`). This repo inherits its `.claude/` from a USE template (recorded in `.claude/.coc-sync-marker`; auto-detected at first run).

