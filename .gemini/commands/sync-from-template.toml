## Downstream Sync

This is a **merge**, not an overwrite. Pull the latest artifacts from the upstream template and merge them, preserving consumer-OWNED paths. Delegate to `skills/30-claude-code-patterns/sync-flow.md` Â§ Downstream Sync:

1. Resolve the upstream template from `.claude/.coc-sync-marker` (template repo + version).
2. Diff the consumer's managed `.claude/` paths against the template's current artifacts.
3. Merge per the additive semantics: global artifacts refresh from the template; **project-specific artifacts** (`.gemini/agents/project/`, `.gemini/skills/project/`, and any path the marker declares consumer-owned) MUST NEVER be overwritten.
4. Update `.claude/VERSION` upstream block (template version + `synced_at`).

To offer a COC-artifact improvement back UP to the template, use `/codify` Step-7c (a human-gated PR to the template's `.claude/.proposals/inbox/`) per `artifact-flow.md` Â§ Downstream-Consumer Routing â€” NOT this command.

